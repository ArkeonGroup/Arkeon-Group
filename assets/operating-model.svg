<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img"
     aria-labelledby="opmodel-title opmodel-desc"
     font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif">
  <title id="opmodel-title">Arkeon Group operating model</title>
  <desc id="opmodel-desc">
    Driedeling: Arkeon Group als governance- en holdinglaag bovenop twee operating companies
    (SlimService en Arkeon Relay), met een gestippelde toekomstige operating layer en een
    onderliggende software- en governance-laag.
  </desc>

  <defs>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="0.9" fill="#B8B2A2"/>
    </pattern>
  </defs>

  <!-- frame -->
  <rect x="0.5" y="0.5" width="719" height="459" fill="#FBFAF6" stroke="#E4E0D7"/>

  <!-- top label -->
  <text x="32" y="34" font-size="11" letter-spacing="2.4" fill="#5A5F6B">OPERATING MODEL · v1.0</text>
  <line x1="32" y1="44" x2="688" y2="44" stroke="#E4E0D7"/>

  <!-- ===== Layer 1: Arkeon Group (holding / governance) ===== -->
  <g>
    <rect x="32" y="64" width="656" height="78" fill="#0F1B2D"/>
    <text x="52" y="92" font-size="11" letter-spacing="2.2" fill="#9FA6B5">01 · HOLDING &amp; GOVERNANCE LAYER</text>
    <text x="52" y="120" font-size="22" font-weight="600" fill="#F7F5F0" letter-spacing="-0.4">Arkeon Group</text>
    <text x="668" y="120" font-size="13" text-anchor="end" fill="#9FA6B5">Trust · Compliance · Control</text>
  </g>

  <!-- connectors down to operating layer -->
  <g stroke="#C9C3B5" stroke-width="1">
    <line x1="148" y1="142" x2="148" y2="172"/>
    <line x1="360" y1="142" x2="360" y2="172"/>
    <line x1="572" y1="142" x2="572" y2="172"/>
  </g>

  <!-- ===== Layer 2: Operating companies ===== -->
  <g>
    <text x="32" y="166" font-size="11" letter-spacing="2.2" fill="#5A5F6B">02 · OPERATING COMPANIES</text>
  </g>

  <!-- SlimService -->
  <g>
    <rect x="32" y="172" width="220" height="100" fill="#FBFAF6" stroke="#1F2330" stroke-width="1.2"/>
    <text x="48" y="200" font-size="11" letter-spacing="2" fill="#5A5F6B">WORK COMPANY</text>
    <text x="48" y="226" font-size="18" font-weight="600" fill="#1F2330">SlimService</text>
    <text x="48" y="250" font-size="12" fill="#3A3F4D">Operationele service- en</text>
    <text x="48" y="265" font-size="12" fill="#3A3F4D">procesautomatisering.</text>
  </g>

  <!-- Arkeon Relay -->
  <g>
    <rect x="252" y="172" width="220" height="100" fill="#FBFAF6" stroke="#1F2330" stroke-width="1.2"/>
    <text x="268" y="200" font-size="11" letter-spacing="2" fill="#5A5F6B">CONTROL LAYER</text>
    <text x="268" y="226" font-size="18" font-weight="600" fill="#1F2330">Arkeon Relay</text>
    <text x="268" y="250" font-size="12" fill="#3A3F4D">Operationele intelligentie en</text>
    <text x="268" y="265" font-size="12" fill="#3A3F4D">control-laag.</text>
  </g>

  <!-- Future placeholder -->
  <g>
    <rect x="472" y="172" width="216" height="100" fill="none" stroke="#B8B2A2" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="488" y="200" font-size="11" letter-spacing="2" fill="#8B8F99">HORIZON</text>
    <text x="488" y="226" font-size="18" font-weight="500" fill="#5A5F6B" font-style="italic">Future operating layer</text>
    <text x="488" y="250" font-size="12" fill="#8B8F99">Aanvullende werkmaatschappij</text>
    <text x="488" y="265" font-size="12" fill="#8B8F99">of softwarelaag.</text>
  </g>

  <!-- connectors down to base layer -->
  <g stroke="#C9C3B5" stroke-width="1">
    <line x1="148" y1="272" x2="148" y2="302"/>
    <line x1="360" y1="272" x2="360" y2="302"/>
    <line x1="572" y1="272" x2="572" y2="302" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== Layer 3: Software & governance ===== -->
  <g>
    <text x="32" y="296" font-size="11" letter-spacing="2.2" fill="#5A5F6B">03 · SOFTWARE &amp; GOVERNANCE FOUNDATION</text>
    <rect x="32" y="302" width="656" height="92" fill="url(#dots)" stroke="#E4E0D7"/>
    <rect x="32" y="302" width="656" height="92" fill="#FBFAF6" fill-opacity="0.55" stroke="#E4E0D7"/>
    <text x="52" y="332" font-size="13" font-weight="600" fill="#1F2330">Auditability · Logging · Role-based control · Privacy posture</text>
    <text x="52" y="354" font-size="12" fill="#3A3F4D">Gemeenschappelijke discipline voor traceerbaarheid, evidence en human-in-control workflows,</text>
    <text x="52" y="370" font-size="12" fill="#3A3F4D">over alle operating companies heen.</text>
  </g>

  <!-- bottom rule + meta -->
  <line x1="32" y1="412" x2="688" y2="412" stroke="#E4E0D7"/>
  <text x="32" y="436" font-size="11" letter-spacing="2.2" fill="#8B8F99">arkeongroup.nl · governance-first</text>
  <text x="688" y="436" font-size="11" text-anchor="end" letter-spacing="2.2" fill="#8B8F99">light authority · v1.0</text>
</svg>
