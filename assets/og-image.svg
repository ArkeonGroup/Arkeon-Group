<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Arkeon Group">
  <rect width="1200" height="630" fill="#F7F5F0"/>

  <!-- subtle horizon rule -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#E4E0D7" stroke-width="1"/>

  <!-- mark -->
  <g transform="translate(80,80)">
    <rect width="56" height="56" rx="8" fill="#0F1B2D"/>
    <g fill="none" stroke="#F7F5F0" stroke-width="2.2" stroke-linecap="square">
      <path d="M12 40 L28 14 L44 40"/>
      <path d="M19 33 H37" stroke-opacity="0.55"/>
      <path d="M22 27 H34" stroke-opacity="0.35"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif" fill="#1F2330">
    <text x="160" y="120" font-size="28" font-weight="600" letter-spacing="-0.5">Arkeon Group</text>
    <text x="160" y="148" font-size="16" fill="#5A5F6B" letter-spacing="2.2">HOLDING · GOVERNANCE LAYER</text>
  </g>

  <!-- headline -->
  <text x="80" y="320" font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-size="64" font-weight="600" fill="#1F2330" letter-spacing="-1.6">
    De holding achter operationele
  </text>
  <text x="80" y="392" font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-size="64" font-weight="600" fill="#1F2330" letter-spacing="-1.6">
    intelligentie en governance.
  </text>

  <!-- sub -->
  <text x="80" y="448" font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-size="22" fill="#3A3F4D">
    Arkeon Group ontwikkelt en bestuurt werkmaatschappijen en softwarelagen voor
  </text>
  <text x="80" y="478" font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-size="22" fill="#3A3F4D">
    operationele controle, traceerbaarheid en compliance-bewuste automatisering.
  </text>

  <!-- footer line -->
  <text x="80" y="582" font-family="system-ui, -apple-system, Segoe UI, Inter, sans-serif"
        font-size="14" fill="#5A5F6B" letter-spacing="2.4">
